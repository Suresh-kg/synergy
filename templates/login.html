<!DOCTYPE html>
<html>
<head>

    <title>Synergy Admin Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/main.css') }}">

    <style>

        body{
            margin:0;
            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
            135deg,
            #0f172a,
            #1e3a8a,
            #2563eb);

            font-family:'Segoe UI',sans-serif;
        }

        .login-card{

            width:420px;

            background:white;

            padding:50px;

            border-radius:25px;

            box-shadow:
            0 20px 50px rgba(0,0,0,.25);

            text-align:center;
        }

        .logo{

            width:90px;
            margin-bottom:15px;
        }

        h1{

            color:#1e3a8a;
            margin-bottom:10px;
        }

        .subtitle{

            color:#64748b;
            margin-bottom:30px;
        }

        .form-group{

            text-align:left;
            margin-bottom:20px;
        }

        .form-group label{

            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#334155;
        }

        .form-group input{

            width:100%;
            padding:14px;

            border:1px solid #dbeafe;

            border-radius:10px;

            font-size:15px;
        }

        .form-group input:focus{

            outline:none;

            border-color:#2563eb;
        }

        .login-btn{

            width:100%;

            padding:14px;

            border:none;

            border-radius:10px;

            background:#2563eb;

            color:white;

            font-size:16px;

            font-weight:700;

            cursor:pointer;

            transition:.3s;
        }

        .login-btn:hover{

            background:#1d4ed8;

            transform:translateY(-2px);
        }

        .footer{

            margin-top:25px;

            color:#94a3b8;

            font-size:13px;
        }

    </style>

</head>

<body>

    <div class="login-card">

        <img
        class="logo"
        src="{{ url_for('static',
        filename='images/logo.png') }}"
        alt="Logo">

        <h1>Synergy Admin</h1>

        <p class="subtitle">
            Secure Dashboard Access
        </p>

        <form
        action="/login_submit"
        method="POST">

            <div class="form-group">

                <label>Username</label>

                <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>

            </div>

            {% if error %}
            <div
            style="
            background:#fee2e2;
            color:#dc2626;
            padding:12px;
            border-radius:8px;
            margin-bottom:15px;">

            {{ error }}

            </div>
            {% endif %}

            <button
            class="login-btn"
            type="submit">

                Login Securely

            </button>

        </form>

        <div class="footer">

            © 2026 Synergy Training Institute

        </div>

    </div>

</body>
</html>
